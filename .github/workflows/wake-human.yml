name: Wake site with human-like Playwright flow

on:
  workflow_dispatch:
  schedule:
    - cron: '*/7 * * * *'

concurrency:
  group: wake-human-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wake-human:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install --with-deps chromium

      - name: Run browser-only wake flow
        env:
          TARGET_URL: https://dososda.containers.snapdeploy.dev
        run: |
          set -o pipefail
          npm run wake:human 2>&1 | tee wake.log

      - name: Upload wake proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wake-human-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            wake-proof.png
            wake.log
